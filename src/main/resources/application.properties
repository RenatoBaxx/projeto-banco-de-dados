spring.application.name=HUB

# --- MongoDB (Atlas ou outro cluster) ---
# URI completa em variável de ambiente; nunca commitar credenciais.
spring.mongodb.uri=${MONGO_URI_AKIRA}

# --- Simulação de métricas no Redis (desenvolvimento / demo) ---
# Ao subir: seed de "online" por jogo; depois oscila a cada interval-ms.
app.simulacao-jogadores-online.enabled=true
app.simulacao-jogadores-online.interval-ms=5000
app.simulacao-jogadores-online.variacao-max-absoluta=500

# --- Redis ---
# flush-on-startup: esvazia o Redis antes de repovoar o catálogo (desligue se a instância for partilhada).
app.redis.flush-on-startup=true
app.redis.flush-on-shutdown=false

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# --- Supabase (Auth + REST para tabela empresas) ---
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}

# --- Ficheiros .zip dos jogos no disco local do servidor ---
app.uploads.jogos-dir=uploads/games
