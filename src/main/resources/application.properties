spring.application.name=HUB

# --- MongoDB ---
spring.mongodb.uri=${MONGO_URI_AKIRA}

# --- Simulação de métricas no Redis ---
app.simulacao-jogadores-online.enabled=true
app.simulacao-jogadores-online.interval-ms=5000
app.simulacao-jogadores-online.variacao-max-absoluta=500

# --- Redis ---
app.redis.flush-on-startup=true

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

