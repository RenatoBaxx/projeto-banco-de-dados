spring.mongodb.uri=${MONGO_URI_AKIRA}

# Simulação de jogadores online (Redis): seed aleatório no boot + variação periódica
app.simulacao-jogadores-online.enabled=true
app.simulacao-jogadores-online.interval-ms=5000
app.simulacao-jogadores-online.variacao-max-absoluta=500

# Redis: esvaziar tudo no boot (antes do catalog warmup). Desligue em produção se o Redis for compartilhado.
app.redis.flush-on-startup=true
# Opcional: FLUSHALL ao encerrar o processo (menos confiável com kill -9).
app.redis.flush-on-shutdown=false

# Configuração do Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Configuração do Supabase
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
