<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game Stats (Redis)</title>
  </head>
  <body>
    <h1>Game Stats - Redis</h1>

    <!-- ENTRAR NO JOGO -->
    <h2>Entrar no jogo</h2>
    Game ID:
    <input type="text" id="enterGameId" />

    User ID:
    <input type="text" id="enterUserId" />

    <button onclick="enterGame()">Entrar</button>

    <hr />

    <!-- SAIR DO JOGO -->
    <h2>Sair do jogo</h2>
    Game ID:
    <input type="text" id="leaveGameId" />

    User ID:
    <input type="text" id="leaveUserId" />

    <button onclick="leaveGame()">Sair</button>

    <hr />

    <!-- VER STATS -->
    <h2>Ver Estatísticas</h2>
    Game ID:
    <input type="text" id="statsGameId" />

    <button onclick="getStats()">Buscar</button>

    <pre id="statsResult"></pre>

    <hr />

    <!-- USUÁRIOS ONLINE -->
    <h2>Usuários Online</h2>
    Game ID:
    <input type="text" id="usersGameId" />

    <button onclick="getUsers()">Ver Usuários</button>

    <pre id="usersResult"></pre>

    <hr />

    <!-- RANKING -->
    <h2>Ranking Top Jogos</h2>

    <button onclick="getRanking()">Ver Ranking</button>

    <pre id="rankingResult"></pre>

    <script src="/index.js"></script>
  </body>
</html>
